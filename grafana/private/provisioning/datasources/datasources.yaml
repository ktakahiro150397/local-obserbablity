apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Tempo
    orgId: 1
  - name: Loki
    orgId: 1
  - name: Pyroscope
    orgId: 1
  - name: AI Usage Ledger
    orgId: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 60s
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://127.0.0.1:3200
    editable: false
    jsonData:
      nodeGraph:
        enabled: true
      search:
        hide: false
      serviceMap:
        datasourceUid: prometheus
  - name: AI Usage Ledger
    uid: usage-ledger
    type: postgres
    access: proxy
    url: private-ledger:5432
    user: ledger_grafana
    database: usage_ledger
    editable: false
    jsonData:
      database: usage_ledger
      sslmode: disable
      postgresVersion: 1700
      timescaledb: false
    secureJsonData:
      password: $__file{/run/secrets/private_ledger_grafana_password}
