name: local-observability

x-lgtm-common: &lgtm-common
  image: docker.io/grafana/otel-lgtm:0.29.1@sha256:b4da8bf6b1b44f6f683883869619eb9781465c642ce5f2d70591fb27094ddb1c
  # Match the owner of the 0700 bind-mounted data directories. Running LGTM
  # as non-root keeps cap_drop=ALL viable and avoids broadening host modes.
  user: ${LGTM_UID_GID:-1000:1000}
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  pids_limit: 768
  healthcheck:
    test:
      - CMD-SHELL
      - >-
        curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null &&
        curl --fail --silent http://127.0.0.1:3200/ready >/dev/null &&
        curl --fail --silent http://127.0.0.1:9090/-/ready >/dev/null
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 60s

x-ledger-common: &ledger-common
  image: docker.io/library/postgres:17.10-bookworm@sha256:4f736ae292687621d4dbe0d499ffd024a36bd2ee7d8ca6f2ccd4c800f047b394
  entrypoint: ["/opt/ledger/schema/ledger-entrypoint.sh"]
  command: ["postgres"]
  restart: unless-stopped
  environment:
    POSTGRES_USER: ledger_admin
    POSTGRES_DB: usage_ledger
    POSTGRES_PASSWORD_FILE: /run/secrets/ledger_admin_password
    POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=trust --data-checksums
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=32m
    - /run/postgresql:rw,noexec,nosuid,size=16m,uid=999,gid=999
    - /run/ledger-secrets:rw,noexec,nosuid,size=1m,uid=999,gid=999,mode=0700
  shm_size: 128m
  pids_limit: 256
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ledger_admin -d usage_ledger"]
    interval: 10s
    timeout: 5s
    retries: 6
    start_period: 30s

services:
  private-lgtm:
    <<: *lgtm-common
    container_name: local-observability-private-lgtm
    environment:
      GF_SECURITY_ADMIN_USER: ${PRIVATE_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${PRIVATE_GRAFANA_ADMIN_PASSWORD:?set PRIVATE_GRAFANA_ADMIN_PASSWORD in .env}
      GF_SECURITY_SECRET_KEY: ${PRIVATE_GRAFANA_SECRET_KEY:?set PRIVATE_GRAFANA_SECRET_KEY in .env}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SERVER_ROOT_URL: ${PRIVATE_GRAFANA_ROOT_URL:-http://localhost:3002}
      PROMETHEUS_EXTRA_ARGS: ${PROMETHEUS_EXTRA_ARGS:---storage.tsdb.retention.time=30d}
      TEMPO_EXTRA_ARGS: ${TEMPO_EXTRA_ARGS:-}
    volumes:
      - type: bind
        source: ${PRIVATE_DATA_DIR:?set PRIVATE_DATA_DIR in .env}
        target: /data
      - type: bind
        source: ${PRIVATE_DATA_DIR:?set PRIVATE_DATA_DIR in .env}/tempo-runtime
        target: /var/tempo
      - type: bind
        source: ./grafana/private/provisioning/datasources/datasources.yaml
        target: /otel-lgtm/grafana/conf/provisioning/datasources/grafana-datasources.yaml
        read_only: true
      - type: bind
        source: ./grafana/private/provisioning/dashboards/dashboards.yaml
        target: /otel-lgtm/grafana/conf/provisioning/dashboards/phase1.yaml
        read_only: true
      - type: bind
        source: ./grafana/private/dashboards
        target: /otel-lgtm/grafana/conf/provisioning/dashboards/phase1
        read_only: true
    secrets:
      - source: private_ledger_grafana_password
        target: private_ledger_grafana_password
    ports:
      - "${PRIVATE_GRAFANA_BIND:-127.0.0.1}:${PRIVATE_GRAFANA_PORT:-3002}:3000"
    networks:
      private-backend:
        ipv4_address: 172.30.1.3
      # A non-internal bridge is required for Docker to install the localhost
      # published-port rule. No other service joins this admin-only network.
      private-admin:
        ipv4_address: 172.30.4.3
    mem_limit: ${PRIVATE_LGTM_MEMORY_LIMIT:-3000m}
    cpus: ${PRIVATE_LGTM_CPU_LIMIT:-1.5}

  shared-lgtm:
    <<: *lgtm-common
    container_name: local-observability-shared-lgtm
    environment:
      GF_SECURITY_ADMIN_USER: ${SHARED_GRAFANA_ADMIN_USER:-breakglass}
      GF_SECURITY_ADMIN_PASSWORD: ${SHARED_GRAFANA_ADMIN_PASSWORD:?set SHARED_GRAFANA_ADMIN_PASSWORD in .env}
      GF_SECURITY_SECRET_KEY: ${SHARED_GRAFANA_SECRET_KEY:?set SHARED_GRAFANA_SECRET_KEY in .env}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: Cf-Access-Authenticated-User-Email
      GF_AUTH_PROXY_HEADER_PROPERTY: email
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_SYNC_TTL: "0"
      GF_AUTH_PROXY_WHITELIST: 172.30.3.2
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: lax
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SERVER_DOMAIN: observe.yanelmo.net
      GF_SERVER_ROOT_URL: https://observe.yanelmo.net
      GF_SERVER_ENFORCE_DOMAIN: "false"
      PROMETHEUS_EXTRA_ARGS: ${PROMETHEUS_EXTRA_ARGS:---storage.tsdb.retention.time=30d}
      TEMPO_EXTRA_ARGS: ${TEMPO_EXTRA_ARGS:-}
    volumes:
      - type: bind
        source: ${SHARED_DATA_DIR:?set SHARED_DATA_DIR in .env}
        target: /data
      - type: bind
        source: ${SHARED_DATA_DIR:?set SHARED_DATA_DIR in .env}/tempo-runtime
        target: /var/tempo
      - type: bind
        source: ./grafana/shared/provisioning/datasources/datasources.yaml
        target: /otel-lgtm/grafana/conf/provisioning/datasources/grafana-datasources.yaml
        read_only: true
      - type: bind
        source: ./grafana/shared/provisioning/dashboards/dashboards.yaml
        target: /otel-lgtm/grafana/conf/provisioning/dashboards/phase1.yaml
        read_only: true
      - type: bind
        source: ./grafana/shared/dashboards
        target: /otel-lgtm/grafana/conf/provisioning/dashboards/phase1
        read_only: true
    secrets:
      - source: shared_ledger_grafana_password
        target: shared_ledger_grafana_password
    ports:
      - "${SHARED_GRAFANA_BIND:-127.0.0.1}:${SHARED_GRAFANA_PORT:-3003}:3000"
    networks:
      shared-backend:
        ipv4_address: 172.30.2.3
      shared-proxy:
        ipv4_address: 172.30.3.3
    mem_limit: ${SHARED_LGTM_MEMORY_LIMIT:-3000m}
    cpus: ${SHARED_LGTM_CPU_LIMIT:-1.5}

  otel-router:
    image: docker.io/otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
    container_name: local-observability-otel-router
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - type: bind
        source: ./collector/config.yaml
        target: /etc/otelcol-contrib/config.yaml
        read_only: true
    ports:
      - "${OTLP_HTTP_BIND:-127.0.0.1}:${OTLP_HTTP_PORT:-4318}:4318"
      - "127.0.0.1:${OTEL_HEALTH_PORT:-13133}:13133"
    networks:
      ingest:
        ipv4_address: 172.29.0.10
      private-backend:
        ipv4_address: 172.30.1.2
      shared-backend:
        ipv4_address: 172.30.2.2
    depends_on:
      private-lgtm:
        condition: service_healthy
      shared-lgtm:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: ${OTEL_ROUTER_MEMORY_LIMIT:-384m}
    cpus: ${OTEL_ROUTER_CPU_LIMIT:-0.5}

  private-ledger:
    <<: *ledger-common
    container_name: local-observability-private-ledger
    environment:
      POSTGRES_USER: ledger_admin
      POSTGRES_DB: usage_ledger
      POSTGRES_PASSWORD_FILE: /run/secrets/ledger_admin_password
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=trust --data-checksums
      LEDGER_DOMAIN: private
    volumes:
      - private-ledger-data:/var/lib/postgresql/data
      - type: bind
        source: ./backfill/schema
        target: /opt/ledger/schema
        read_only: true
      - type: bind
        source: ./backfill/schema/init-ledger.sh
        target: /docker-entrypoint-initdb.d/010-ledger.sh
        read_only: true
    secrets:
      - source: private_ledger_admin_password
        target: ledger_admin_password
      - source: private_ledger_writer_password
        target: ledger_writer_password
      - source: private_ledger_grafana_password
        target: ledger_grafana_password
    networks:
      private-backend:
        ipv4_address: 172.30.1.4
    mem_limit: ${PRIVATE_LEDGER_MEMORY_LIMIT:-384m}
    cpus: ${PRIVATE_LEDGER_CPU_LIMIT:-0.5}

  shared-ledger:
    <<: *ledger-common
    container_name: local-observability-shared-ledger
    environment:
      POSTGRES_USER: ledger_admin
      POSTGRES_DB: usage_ledger
      POSTGRES_PASSWORD_FILE: /run/secrets/ledger_admin_password
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=trust --data-checksums
      LEDGER_DOMAIN: shared
    volumes:
      - shared-ledger-data:/var/lib/postgresql/data
      - type: bind
        source: ./backfill/schema
        target: /opt/ledger/schema
        read_only: true
      - type: bind
        source: ./backfill/schema/init-ledger.sh
        target: /docker-entrypoint-initdb.d/010-ledger.sh
        read_only: true
    secrets:
      - source: shared_ledger_admin_password
        target: ledger_admin_password
      - source: shared_ledger_writer_password
        target: ledger_writer_password
      - source: shared_ledger_grafana_password
        target: ledger_grafana_password
    networks:
      shared-backend:
        ipv4_address: 172.30.2.4
    mem_limit: ${SHARED_LEDGER_MEMORY_LIMIT:-384m}
    cpus: ${SHARED_LEDGER_CPU_LIMIT:-0.5}

  hermes-live-rollup:
    build:
      context: .
      dockerfile: rollup/Dockerfile
    image: local-observability/hermes-live-rollup:1.0.0
    container_name: local-observability-hermes-live-rollup
    # Compose file secrets retain host ownership. Match the 0600 writer-secret
    # owner instead of weakening its mode.
    user: ${HERMES_ROLLUP_UID_GID:-1000:1000}
    restart: unless-stopped
    environment:
      TEMPO_URL: http://shared-lgtm:3200
      POSTGRES_HOST: shared-ledger
      POSTGRES_PORT: "5432"
      POSTGRES_DB: usage_ledger
      POSTGRES_USER: ledger_writer
      POSTGRES_PASSWORD_FILE: /run/secrets/ledger_writer_password
      ROLLUP_SERVICE_NAME: backup-secretary-hermes
      ROLLUP_INSTANCES: main,owashota
      ROLLUP_LEDGER_INSTANCE_PREFIX: hermes-
      ROLLUP_INTERVAL_SECONDS: ${HERMES_ROLLUP_INTERVAL_SECONDS:-300}
      ROLLUP_OVERLAP_SECONDS: ${HERMES_ROLLUP_OVERLAP_SECONDS:-1800}
      ROLLUP_GRACE_SECONDS: ${HERMES_ROLLUP_GRACE_SECONDS:-120}
      ROLLUP_MAX_WINDOW_SECONDS: "7200"
      ROLLUP_SEARCH_LIMIT: "1000"
      ROLLUP_MINIMUM_SPLIT_SECONDS: "60"
      ROLLUP_HTTP_TIMEOUT_SECONDS: "30"
      ROLLUP_HEALTH_FILE: /tmp/rollup-last-success
    secrets:
      - source: shared_ledger_writer_password
        target: ledger_writer_password
    networks:
      shared-backend:
        ipv4_address: 172.30.2.5
    depends_on:
      shared-lgtm:
        condition: service_healthy
      shared-ledger:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=8m,uid=${HERMES_ROLLUP_UID:-1000},gid=${HERMES_ROLLUP_GID:-1000},mode=0700
    pids_limit: 128
    mem_limit: ${HERMES_ROLLUP_MEMORY_LIMIT:-192m}
    cpus: ${HERMES_ROLLUP_CPU_LIMIT:-0.25}
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5m

  codex-live-rollup:
    build:
      context: .
      dockerfile: rollup/Dockerfile
    image: local-observability/codex-live-rollup:1.0.0
    container_name: local-observability-codex-live-rollup
    entrypoint: ["python", "/app/codex_live_rollup.py"]
    user: ${CODEX_ROLLUP_UID_GID:-1000:1000}
    restart: unless-stopped
    environment:
      TEMPO_URL: http://private-lgtm:3200
      POSTGRES_HOST: private-ledger
      POSTGRES_PORT: "5432"
      POSTGRES_DB: usage_ledger
      POSTGRES_USER: ledger_writer
      POSTGRES_PASSWORD_FILE: /run/secrets/ledger_writer_password
      ROLLUP_SOURCE_INSTANCE: main-windows
      ROLLUP_SERVICE_NAMES: codex_exec,codex-app-server,Codex Desktop
      ROLLUP_INTERVAL_SECONDS: ${CODEX_ROLLUP_INTERVAL_SECONDS:-300}
      ROLLUP_OVERLAP_SECONDS: ${CODEX_ROLLUP_OVERLAP_SECONDS:-1800}
      ROLLUP_GRACE_SECONDS: ${CODEX_ROLLUP_GRACE_SECONDS:-120}
      ROLLUP_MAX_WINDOW_SECONDS: "7200"
      ROLLUP_SEARCH_LIMIT: "1000"
      ROLLUP_MINIMUM_SPLIT_SECONDS: "60"
      ROLLUP_HTTP_TIMEOUT_SECONDS: "30"
      ROLLUP_HEALTH_FILE: /tmp/codex-rollup-last-success
    secrets:
      - source: private_ledger_writer_password
        target: ledger_writer_password
    networks:
      private-backend:
        ipv4_address: 172.30.1.5
    depends_on:
      private-lgtm:
        condition: service_healthy
      private-ledger:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=8m,uid=${CODEX_ROLLUP_UID:-1000},gid=${CODEX_ROLLUP_GID:-1000},mode=0700
    pids_limit: 128
    mem_limit: ${CODEX_ROLLUP_MEMORY_LIMIT:-192m}
    cpus: ${CODEX_ROLLUP_CPU_LIMIT:-0.25}
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5m

  cloudflared:
    image: docker.io/cloudflare/cloudflared:2026.7.2@sha256:4f6655284ab3d252b7f28fedb19fe6c8fc82ee5b1295c20ac74d475e5398a52d
    container_name: local-observability-cloudflared
    user: "${CLOUDFLARED_UID_GID:?Set CLOUDFLARED_UID_GID to the token file owner UID:GID}"
    profiles: ["public"]
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - --metrics
      - 0.0.0.0:2000
      - run
      - --token-file
      - /run/secrets/cloudflare_tunnel_token
    secrets:
      - cloudflare_tunnel_token
    networks:
      shared-proxy:
        ipv4_address: 172.30.3.2
    depends_on:
      shared-lgtm:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    pids_limit: 128
    mem_limit: ${CLOUDFLARED_MEMORY_LIMIT:-128m}
    cpus: ${CLOUDFLARED_CPU_LIMIT:-0.25}
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ingest:
    name: local-observability-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24
  private-backend:
    name: local-observability-private-backend
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.1.0/24
  private-admin:
    name: local-observability-private-admin
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.4.0/24
  shared-backend:
    name: local-observability-shared-backend
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.2.0/24
  shared-proxy:
    name: local-observability-shared-proxy
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.3.0/24

secrets:
  cloudflare_tunnel_token:
    file: ./secrets/cloudflare-tunnel.token
  private_ledger_admin_password:
    file: ./secrets/private-ledger-admin-password
  private_ledger_writer_password:
    file: ./secrets/private-ledger-writer-password
  private_ledger_grafana_password:
    file: ./secrets/private-ledger-grafana-password
  shared_ledger_admin_password:
    file: ./secrets/shared-ledger-admin-password
  shared_ledger_writer_password:
    file: ./secrets/shared-ledger-writer-password
  shared_ledger_grafana_password:
    file: ./secrets/shared-ledger-grafana-password

volumes:
  private-ledger-data:
    name: local-observability-private-ledger-data
  shared-ledger-data:
    name: local-observability-shared-ledger-data
